services:
  postgres:
    image: postgres:16-alpine
    container_name: swingops-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: swingops
      POSTGRES_PASSWORD: swingops
      POSTGRES_DB: swingops_ai
    ports:
      - "5433:5432"
    volumes:
      - swingops-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swingops -d swingops_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  swingops-postgres-data:
